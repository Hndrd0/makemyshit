<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make My Shit - Free Image Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(120deg, #00d4ff, #0099ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 1rem;
      color: #888;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      color: #aaa;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      padding: 1rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #222;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #0099ff;
      box-shadow: 0 0 0 3px rgba(0, 153, 255, 0.1);
    }

    textarea:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-generate {
      background: linear-gradient(120deg, #0099ff, #00d4ff);
      color: #000;
    }

    .btn-generate:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 153, 255, 0.3);
    }

    .btn-generate:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-download {
      background: linear-gradient(120deg, #00d4ff, #0099ff);
      color: #000;
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 153, 255, 0.3);
    }

    .error {
      padding: 1rem;
      background: #3d1f1f;
      border: 1px solid #8b3a3a;
      border-radius: 8px;
      color: #ff6b6b;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .image-container {
      background: #222;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .image-container img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: block;
    }

    .loading {
      text-align: center;
      padding: 3rem 1rem;
      color: #888;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #333;
      border-top: 3px solid #0099ff;
      border-radius: 50%;
      margin: 1rem auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .info {
      background: #222;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.85rem;
      color: #999;
      line-height: 1.6;
    }

    .info strong {
      color: #00d4ff;
    }

    .note {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #333;
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 1.8rem;
      }

      body {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>make my shit</h1>
      <p>free ai image generator</p>
    </div>

    <form id="generator-form">
      <div class="form-group">
        <label for="prompt">Describe what you want</label>
        <textarea
          id="prompt"
          placeholder="a mystical forest with glowing mushrooms, digital art style"
          required
        ></textarea>
      </div>

      <button type="submit" class="btn-generate" id="generate-btn">Generate</button>
    </form>

    <div id="error-container"></div>
    <div id="image-container"></div>
  </div>

  <script>
    const form = document.getElementById('generator-form');
    const promptInput = document.getElementById('prompt');
    const generateBtn = document.getElementById('generate-btn');
    const errorContainer = document.getElementById('error-container');
    const imageContainer = document.getElementById('image-container');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const prompt = promptInput.value.trim();
      if (!prompt) return;

      generateBtn.disabled = true;
      generateBtn.textContent = 'Generating...';
      errorContainer.innerHTML = '';
      imageContainer.innerHTML = '';

      try {
        const encodedPrompt = encodeURIComponent(prompt);
        const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}`;

        imageContainer.innerHTML = '<div class="loading"><div>Creating your image...</div><div class="spinner"></div></div>';

        const img = new Image();
        
        img.onload = () => {
          imageContainer.innerHTML = `
            <div class="image-container">
              <img src="${imageUrl}" alt="Generated image">
              <button type="button" class="btn-download" onclick="downloadImage('${imageUrl}')">
                Download Image
              </button>
            </div>
          `;
          generateBtn.disabled = false;
          generateBtn.textContent = 'Generate';
        };

        img.onerror = () => {
          errorContainer.innerHTML = '<div class="error">Failed to generate image. Try a simpler or different prompt.</div>';
          imageContainer.innerHTML = '';
          generateBtn.disabled = false;
          generateBtn.textContent = 'Generate';
        };

        img.src = imageUrl;
      } catch (err) {
        errorContainer.innerHTML = '<div class="error">Something went wrong. Check your prompt and try again.</div>';
        generateBtn.disabled = false;
        generateBtn.textContent = 'Generate';
      }
    });

    function downloadImage(imageUrl) {
      const a = document.createElement('a');
      a.href = imageUrl;
      a.download = `makemyshit-${Date.now()}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  </script>
</body>
</html>
